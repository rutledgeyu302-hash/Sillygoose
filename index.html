<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noah Kelly vs The Horde of Henrys</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#070814;color:#fff;font-family:"Courier New",monospace}
canvas{display:block;width:100vw;height:100vh;background:#070814}
#ui,#shop,#pause{position:fixed;inset:0;pointer-events:none}
#ui{z-index:10}
.panel{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(920px,92vw);padding:24px;border:2px solid rgba(255,255,255,.18);border-radius:8px;background:rgba(4,5,13,.88);box-shadow:0 24px 80px rgba(0,0,0,.55);pointer-events:auto}
.title{font-size:clamp(25px,5vw,56px);line-height:1;text-align:center;color:#ffd34d;text-shadow:0 0 22px rgba(255,155,0,.55);margin-bottom:12px}
.sub{color:#bdc8ff;text-align:center;margin-bottom:18px;line-height:1.45}
.row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
button{font-family:inherit;font-weight:900;letter-spacing:.02em;border:0;border-radius:8px;padding:13px 20px;cursor:pointer;background:#ff9f1c;color:#090806;box-shadow:0 8px 0 #9b5300,0 18px 34px rgba(0,0,0,.3);transition:transform .08s,filter .08s}
button:hover{filter:brightness(1.12)}
button:active{transform:translateY(4px);box-shadow:0 4px 0 #9b5300,0 10px 20px rgba(0,0,0,.3)}
button.red{background:#ff3b30;color:#fff;box-shadow:0 8px 0 #88120d,0 18px 34px rgba(0,0,0,.3)}
button.blue{background:#1f8cff;color:#fff;box-shadow:0 8px 0 #0b3d85,0 18px 34px rgba(0,0,0,.3)}
button.green{background:#20df79;color:#03150b;box-shadow:0 8px 0 #0b773d,0 18px 34px rgba(0,0,0,.3)}
button.ghost{background:#222a42;color:#eaf0ff;box-shadow:0 8px 0 #101525,0 18px 34px rgba(0,0,0,.3)}
.weapons,.shopGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(132px,1fr));gap:12px;margin:18px 0}
.weaponPanel{max-height:min(760px,92vh);display:flex;flex-direction:column;overflow:hidden}
.weaponPanel .title,.weaponPanel .sub,.weaponPanel .row{flex:0 0 auto}
.weaponPanel .weapons{grid-template-columns:repeat(auto-fit,minmax(265px,1fr));min-height:0;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;padding:4px 8px 56px;margin:14px -8px 16px;scrollbar-color:#ffb52b rgba(255,255,255,.08)}
.weaponPanel .weapons::-webkit-scrollbar{width:10px}
.weaponPanel .weapons::-webkit-scrollbar-track{background:rgba(255,255,255,.08);border-radius:999px}
.weaponPanel .weapons::-webkit-scrollbar-thumb{background:#ffb52b;border-radius:999px;border:2px solid rgba(4,5,13,.88)}
.weaponPanel .card{position:relative;min-height:112px;padding:10px;overflow:visible}
.weaponPanel .card:hover,.weaponPanel .card:focus{z-index:15}
.weaponCardTop{display:grid;grid-template-columns:116px minmax(0,1fr);gap:11px;align-items:center}
canvas.weaponArt{display:block;width:116px;height:78px;background:linear-gradient(180deg,#151a2a,#090b13);border:1px solid rgba(255,255,255,.16);border-radius:7px;box-shadow:inset 0 0 0 2px rgba(255,255,255,.035)}
.weaponInfo{min-width:0}
.weaponTag{display:inline-block;margin-bottom:7px;padding:3px 7px;border:1px solid rgba(255,211,77,.55);border-radius:999px;background:#2a2109;color:#ffd34d;font-size:10px;font-weight:900;line-height:1;text-transform:uppercase}
.weaponName{font-weight:900;color:#ffe66d;font-size:15px;line-height:1.14;text-align:left;text-shadow:0 2px 0 #000;overflow-wrap:anywhere}
.weaponHint{margin-top:8px;color:#75e6ff;font-size:10px;font-weight:900;text-align:left;letter-spacing:.03em}
.weaponStats{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.weaponStats span{display:inline-block;padding:3px 6px;border:1px solid rgba(117,230,255,.3);border-radius:5px;background:#071221;color:#d9fbff;font-size:9px;font-weight:900;line-height:1}
.weaponPanel .desc{position:absolute;left:10px;right:10px;top:calc(100% - 4px);z-index:30;display:none;margin:0;padding:12px 13px;border:2px solid #ffb52b;border-radius:8px;background:#050814;color:#edf4ff;box-shadow:0 16px 32px rgba(0,0,0,.72);font-size:12px;line-height:1.35;text-align:left;pointer-events:none}
.weaponPanel .card:hover .desc,.weaponPanel .card:focus .desc{display:block}
.customPanel{max-height:min(780px,94vh);display:flex;flex-direction:column;overflow:hidden}
.profileLine{color:#ffe66d;text-align:center;font-weight:900;margin:-6px 0 12px}
.closetGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(164px,1fr));gap:12px;min-height:0;overflow-y:auto;padding:4px 8px 28px;margin:12px -8px 16px}
.closetGrid .card{min-height:145px}
.closetGrid .owned{color:#5dff9b}
.closetGrid .locked{color:#ffad33}
.recordsPanel{max-height:min(780px,94vh);display:flex;flex-direction:column;overflow:hidden}
.recordsPanel .shopGrid{min-height:0;overflow-y:auto;padding:4px 8px 28px;margin:12px -8px 16px}
.recordsPanel .card{min-height:126px}
.bossPracticePanel .shopGrid{grid-template-columns:repeat(auto-fit,minmax(210px,1fr));min-height:0;overflow-y:auto;padding:4px 8px 30px;margin:12px -8px 16px}
.bossCard{padding:10px;min-height:210px;background:linear-gradient(180deg,#11192d,#080a12);overflow:hidden}
canvas.bossArt{display:block;width:100%;height:112px;border:1px solid rgba(255,255,255,.16);border-radius:7px;background:#070814;box-shadow:inset 0 0 0 2px rgba(255,255,255,.035),0 10px 24px rgba(0,0,0,.25);margin-bottom:9px}
.bossZone{margin:7px auto 0;width:max-content;max-width:100%;padding:3px 7px;border:1px solid rgba(117,230,255,.35);border-radius:999px;background:#071221;color:#75e6ff;font-size:9px;font-weight:900;text-align:center;text-transform:uppercase}
.card{border:2px solid rgba(255,255,255,.14);border-radius:8px;background:#101426;padding:12px;min-height:118px;cursor:pointer;transition:transform .12s,border-color .12s,background .12s}
.card:hover{transform:translateY(-2px);border-color:#ffb52b}
.card.selected{border-color:#28ff8a;background:#0d291d}
.card.equipped{border-color:#75e6ff;background:#10243a}
.card.disabled{opacity:.45;cursor:not-allowed}
.icon{height:46px;font-size:34px;display:grid;place-items:center;margin-bottom:8px}
.name{font-weight:900;color:#ffe66d;font-size:14px;line-height:1.2;text-align:center}
.desc{color:#abb7d9;font-size:12px;line-height:1.25;text-align:center;margin-top:6px}
.cost{color:#5dff9b;font-weight:900;text-align:center;margin-top:8px}
.beefBox{position:absolute;left:50%;bottom:24px;transform:translateX(-50%);width:min(860px,92vw);padding:14px;border:2px solid rgba(255,180,190,.35);border-radius:8px;background:rgba(20,5,13,.82);box-shadow:0 18px 50px rgba(0,0,0,.45);pointer-events:auto}
.beefPrompt{font-weight:900;color:#ffe2e8;text-align:center;line-height:1.35;margin-bottom:12px}
.beefChoices{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
#hud{position:fixed;left:14px;right:14px;top:12px;z-index:8;display:flex;gap:10px;align-items:flex-start;justify-content:space-between;pointer-events:none}
#hud[hidden]{display:none}
.hudBox{background:rgba(3,5,14,.72);border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:9px 11px;min-width:150px;backdrop-filter:blur(4px)}
.hudBox.right{text-align:right}
.bar{height:10px;width:190px;max-width:35vw;background:#25121a;border:1px solid #462a36;border-radius:999px;overflow:hidden;margin-top:6px}
.bar>span{display:block;height:100%;background:linear-gradient(90deg,#ff295c,#ffd047)}
#toast{position:fixed;left:50%;top:106px;transform:translateX(-50%);z-index:12;font-size:clamp(18px,3vw,34px);font-weight:900;color:#fff;text-align:center;text-shadow:0 3px 0 #000,0 0 22px rgba(255,200,64,.75);pointer-events:none}
#shop,#pause{z-index:20;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.78);pointer-events:auto}
#shop.open,#pause.open{display:flex}
#shop .panel,#pause .panel{position:relative;left:auto;top:auto;transform:none}
#mobile{position:fixed;inset:auto 12px 12px 12px;z-index:9;display:none;justify-content:space-between;pointer-events:none}
.pad,.fire{pointer-events:auto;display:grid;place-items:center;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);backdrop-filter:blur(4px);color:#fff}
.pad{width:120px;height:120px;border-radius:999px}
.fire{width:92px;height:92px;border-radius:999px;font-weight:900}
@media (pointer:coarse){#mobile{display:flex}.hudBox{font-size:12px}.bar{width:145px}}
@media (max-width:620px){.panel{padding:18px}.weaponPanel{max-height:94vh}.weapons,.shopGrid{grid-template-columns:repeat(2,1fr)}.weaponPanel .weapons{grid-template-columns:1fr}.weaponCardTop{grid-template-columns:102px minmax(0,1fr)}canvas.weaponArt{width:102px;height:72px}button{padding:12px 15px}.hudBox{min-width:0}.hudBox.mid{display:none}}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud" hidden>
  <div class="hudBox"><b id="hpText">HP 100/100</b><div class="bar"><span id="hpBar"></span></div><div id="shieldText"></div></div>
  <div class="hudBox mid"><b id="waveText">Wave 1</b><br><span id="goalText">0 / 18</span><br><span id="comboText">Combo x1</span></div>
  <div class="hudBox right"><b id="coinText">Coins 0</b><br><span id="scoreText">Score 0</span><br><span id="weaponText">Potion</span></div>
</div>
<div id="toast"></div>
<div id="ui"></div>
<div id="shop"><div class="panel"><div class="title">The Shop</div><p class="sub" id="shopCoins">Coins: 0</p><div class="shopGrid" id="shopGrid"></div><div class="row"><button class="green" id="shopClose">Continue Fighting</button></div></div></div>
<div id="pause"><div class="panel"><div class="title">Paused</div><p class="sub">Stretch your fingers. The Henrys will wait, technically.</p><div class="row"><button class="green" id="resumeBtn">Resume</button><button class="red" id="quitBtn">Quit to Menu</button></div></div></div>
<div id="mobile"><div class="pad" id="pad">MOVE</div><div class="fire" id="fire">FIRE</div></div>
<script>
(() => {
const cvs=document.getElementById("game"),ctx=cvs.getContext("2d"),ui=document.getElementById("ui"),hud=document.getElementById("hud"),toast=document.getElementById("toast");
let W=0,H=0,DPR=1,state="menu",tick=0,shake=0,shakeX=0,shakeY=0,selectedWeapon="potion",game=null,cutscene=null,beef=null,keys=Object.create(null),pointer={x:0,y:0,down:false},shopOpen=false,paused=false,pigBlessed=false;
const TAU=Math.PI*2;
const PACE={player:1.09,enemy:.95,projectile:1.03,boss:.96,weapon:.92,obby:.86};
const MAIN_WAVES=80,TOTAL_WAVES=100;
const CAMPAIGN_ZONES=[
 {id:"hallway",name:"Hallway",range:"1-13",waves:[1,13],boss:"Mr. Jorden",music:"locker pulse",top:"#070814",mid:"#17213f",floor:"#171127",accent:"#75e6ff",enemy:"basic Henrys",detail:"lockers, cracked trophy cases, buzzing lights"},
 {id:"cafeteria",name:"Cafeteria",range:"14-27",waves:[14,27],boss:"Colin Ryu",music:"tray-line bass",top:"#120704",mid:"#33200b",floor:"#1d1008",accent:"#ff9f1c",enemy:"runners and food-splashed Henrys",detail:"serving counters, spilled sauce, table barricades"},
 {id:"gym",name:"Gym",range:"28-43",waves:[28,43],boss:"Jamie Ho",music:"bleacher drums",top:"#05111b",mid:"#123052",floor:"#172518",accent:"#ffe66d",enemy:"tank Henrys and shield Henrys",detail:"court lines, bleachers, scoreboard lights"},
 {id:"studyhall",name:"Study Hall",range:"44-63",waves:[44,63],boss:"Goldburg / Mr. F",music:"chalkboard panic",top:"#080b12",mid:"#263044",floor:"#101827",accent:"#00ff88",enemy:"teacher-buffed Henry squads",detail:"chalk dust, cracked wall portals, desks"},
 {id:"parking",name:"Parking Lot",range:"64-80",waves:[64,80],boss:"Mrs. F Mech",music:"engine sirens",top:"#05070d",mid:"#151b2d",floor:"#161a1f",accent:"#ff4da6",enemy:"late-game mixed swarms",detail:"cars, cones, crosswalks, sodium lights"},
 {id:"finalexam",name:"Final Exam Arena",range:"81-100",waves:[81,100],boss:"Tung / Envision / Tsai",music:"exam boss rush",top:"#12020a",mid:"#291226",floor:"#130915",accent:"#ff334d",enemy:"everything at once",detail:"red exam grid, warning tape, impossible pressure"}
];
const FUSION_CLUES=[
 ["potion+sword","secret stick","Marie plus Colin makes the forbidden stick."],
 ["dabtech+leoyu","rocket volley","Soccer tech plus Iron Man makes a missile cross."],
 ["plague+chatgpt","homework outbreak","AI plus plague spreads homework sickness."],
 ["boulder+dariusjet","meteor runway","Jet impact plus boulder turns the lane into a crater."],
 ["brandonmuscles+nicholaswrestle","suplex pump","Muscles plus wrestling makes a heavier slam."],
 ["gioguitar+motyrap","concert wave","Guitar plus rap sends a real soundstorm."],
 ["rydergolf+seamusmoose","varsity cannon","Golf plus lacrosse creates fast precision shots."],
 ["wyatt+justinquads","monster sprint","Titan mode plus quads turns Noah into a charging tank."],
 ["cameronbed+tolerreaks","lost bed delivery","The glove starts throwing bedroom furniture."],
 ["jackgun+haydenface","sniper beam","Fourth-shot aim plus face beam hits boss weak points."],
 ["charliebeer+keithbeef","acid milk","Acid can plus milk gun makes corrosive splash shots."],
 ["cecehockey+hockey","stick tantrum","Two sticks make an extremely aggressive joke combo."]
];
function campaignZoneForWave(wave=1){return CAMPAIGN_ZONES.find(z=>wave>=z.waves[0]&&wave<=z.waves[1])||CAMPAIGN_ZONES[CAMPAIGN_ZONES.length-1]}
function campaignZoneForBoss(id,wave=1){
 const map={jordan:"hallway",gavin:"hallway",parker:"hallway",goldenberg:"studyhall",demonicgoldenberg:"studyhall",max:"studyhall",isaac:"studyhall",jennifer:"studyhall",aiden:"cafeteria",chris_chase:"gym",tate:"studyhall",colin:"cafeteria",jamieho:"gym",bowe:"studyhall",mrg:"studyhall",mrsg:"parking",tung:"finalexam",envision:"finalexam",tsai:"finalexam",rutledge:"finalexam"};
 return CAMPAIGN_ZONES.find(z=>z.id===(map[id]||campaignZoneForWave(wave).id))||campaignZoneForWave(wave)
}
function campaignZoneForGame(g=game){return g&&g.boss?campaignZoneForBoss(g.boss.id,g.wave):campaignZoneForWave(g&&g.wave||1)}
function colorWithAlpha(hex,a){const h=(hex||"#75e6ff").replace("#","");const v=h.length===3?h.split("").map(c=>c+c).join(""):h;const n=parseInt(v,16);return`rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`}
function resize(){DPR=Math.max(1,Math.min(2,devicePixelRatio||1));W=innerWidth;H=innerHeight;cvs.width=Math.floor(W*DPR);cvs.height=Math.floor(H*DPR);ctx.setTransform(DPR,0,0,DPR,0,0)}
addEventListener("resize",resize);resize();
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const easeInOut=t=>t*t*(3-2*t);
const easeOut=t=>1-Math.pow(1-t,3);
const rand=(a,b)=>a+Math.random()*(b-a);
const dist=(a,b,c,d)=>Math.hypot(c-a,d-b);
const angleTo=(a,b,c,d)=>Math.atan2(d-b,c-a);
const lineDist=(px,py,ax,ay,bx,by)=>{const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;if(!l2)return dist(px,py,ax,ay);const t=clamp(((px-ax)*dx+(py-ay)*dy)/l2,0,1);return dist(px,py,ax+dx*t,ay+dy*t)};
function flash(text,ms=1500){toast.textContent=text;toast.style.opacity=1;clearTimeout(flash.t);flash.t=setTimeout(()=>toast.style.opacity=0,ms)}
function clearUI(){ui.innerHTML=""}
function panel(html){clearUI();const d=document.createElement("div");d.className="panel";d.innerHTML=html;ui.appendChild(d);return d}
function button(label,cls,fn){const b=document.createElement("button");b.className=cls||"";b.textContent=label;b.onclick=fn;return b}
function closeOverlays(){shopOpen=false;paused=false;document.getElementById("shop").classList.remove("open");document.getElementById("pause").classList.remove("open")}
function rumble(n){shake=Math.max(shake,n)}
function updateShake(){if(shake>0.2){shakeX=rand(-shake,shake);shakeY=rand(-shake,shake);shake*=0.82}else{shake=shakeX=shakeY=0}}
const particles=[],texts=[];
function burst(x,y,color,n=12,power=4){for(let i=0;i<n;i++){const a=Math.random()*TAU,s=rand(1,power);particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rand(24,46),max:46,r:rand(2,5),color})}}
function textPop(x,y,text,color="#fff"){texts.push({x,y,vy:-1.5,life:55,max:55,text,color})}
function bossLine(x1,y1,x2,y2,width=30,dmg=18,warn=42,active=18,color="#ff3355"){if(!game||!game.hazards)return;game.hazards.push({kind:"line",x1,y1,x2,y2,w:width,dmg,warn,active,maxWarn:warn,maxActive:active,color,hit:false})}
function bossRing(x,y,r,width=28,dmg=16,warn=45,active=18,color="#ff9f1c"){if(!game||!game.hazards)return;game.hazards.push({kind:"ring",x,y,r,w:width,dmg,warn,active,maxWarn:warn,maxActive:active,color,hit:false})}
function bossCone(x,y,a,len=520,width=76,dmg=20,warn=48,active=22,color="#ffe66d"){if(!game||!game.hazards)return;game.hazards.push({kind:"beam",x,y,a,len,w:width,dmg,warn,active,maxWarn:warn,maxActive:active,color,hit:false})}
function updateFx(){for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vx*=.98;p.vy=p.vy*.98+.04;p.life--}for(const t of texts){t.y+=t.vy;t.life--}for(let i=particles.length-1;i>=0;i--)if(particles[i].life<=0)particles.splice(i,1);for(let i=texts.length-1;i>=0;i--)if(texts[i].life<=0)texts.splice(i,1);if(particles.length>420)particles.splice(0,particles.length-420);if(texts.length>80)texts.splice(0,texts.length-80)}
function drawFx(){for(const p of particles){ctx.globalAlpha=Math.max(0,p.life/p.max);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,TAU);ctx.fill()}for(const t of texts){ctx.globalAlpha=Math.max(0,t.life/t.max);ctx.font="900 16px Courier New";ctx.textAlign="center";ctx.strokeStyle="#000";ctx.lineWidth=4;ctx.fillStyle=t.color;ctx.strokeText(t.text,t.x,t.y);ctx.fillText(t.text,t.x,t.y)}ctx.globalAlpha=1}
const weapons=[
 {id:"potion",icon:"🧪",name:"Marie's Demon Potion",desc:"Click once for demon mode, then slash wide arcs."},
 {id:"sword",icon:"⚔",name:"Sword of Colin Ryu",desc:"Reliable melee with fast sweeping attacks."},
 {id:"nicholaswrestle",icon:"GRAB",name:"Nicholas's Wrestling Moves",desc:"Grapple one Henry, slam it, and shake nearby zombies."},
 {id:"hockey",icon:"⌐",name:"Hockey Stick",desc:"Fires bouncing pucks that slap enemies around."},
 {id:"seamusmoose",icon:"MOOSE",name:"Seamus Gorman's Moose Gun",desc:"An antler-barreled blaster that rapid-fires lacrosse balls."},
 {id:"haydenface",icon:"FACE",name:"Hayden's Face",desc:"A focused face beam that burns through a lane."},
 {id:"dariusjet",icon:"JET",name:"Darius's Private Jet",desc:"Calls a heavy jet strike with a long cooldown."},
 {id:"dabtech",icon:"⚽",name:"Dab's Soccer Tech Work",desc:"Click for a dodge volley. Hold F for a power cross, Q for a rainbow-flick dodge burst."},
 {id:"tolerreaks",icon:"GLOVE",name:"Toler Reaks' Glove",desc:"A glove cannon that spits random objects into the horde."},
 {id:"rydergolf",icon:"GOLF",name:"Ryder's Golf Skills",desc:"Drive piercing golf balls in a straight skill-shot lane."},
 {id:"brandonmuscles",icon:"FLEX",name:"Brandon's Muscles",desc:"Flex for armor, then throw a heavy punch that shoves zombies back."},
 {id:"marquesbasketball",icon:"DUNK",name:"Marques's Basketball Skills",desc:"Leap into the lane and dunk so hard the rim shockwave crushes nearby zombies."},
 {id:"aydencanada",icon:"MAPLE",name:"Ayden's Canadian Skills",desc:"Maple-ice slapshots freeze Henrys in a clean lane before cracking them."},
 {id:"leoyu",icon:"SUIT",name:"Leo Yu's Iron Man Suit",desc:"Click repulsors. Hold F for missiles, Q for lasers."},
 {id:"aydahair",icon:"HAIR",name:"Aadyah's Hair",desc:"Whips a giant braided hair lash through the horde."},
 {id:"wyatt",icon:"WYATT",name:"Wyatt's Testosterone",desc:"Turns Noah into a giant monster. Click again to smash."},
 {id:"cameronbed",icon:"BED",name:"Cameron Bedsale's Bed",desc:"Drops a heavy bed from the ceiling onto zombies."},
 {id:"johan",icon:"BUG",name:"Johan's Debugger",desc:"Freezes enemies in a blue error field and drains them."},
 {id:"boulder",icon:"●",name:"Boulder",desc:"Drops a classroom-cracking shockwave."},
 {id:"chatgpt",icon:"AI",name:"ChatGPT",desc:"Summons falling homework from the sky."},
 {id:"plague",icon:"☣",name:"Bubonic Plague",desc:"A plague cloud that spreads through Henrys."},
 {id:"enochscooter",icon:"SCOOT",name:"Enoch's Scooter",desc:"One fast body-check strike. Aim, slam, repeat."},
 {id:"motyrap",icon:"RAP",name:"Moty's Rapping Skills",desc:"Sends expanding beatwaves that shove and shred zombies."},
 {id:"gioguitar",icon:"GTR",name:"Gio's Coco Guitar",desc:"A glowing guitar that fires musical notes and spirit chords."},
 {id:"justinquads",icon:"QUADS",name:"Justin Blades' Quads",desc:"Explosive leg power: sprint, dodge, and kick through crowds."},
 {id:"cecehockey",icon:"SECRET",name:"Cece's Secret Weapon",desc:"A silly joke weapon: throw a hockey stick at people very aggressively."},
 {id:"charliebeer",icon:"ACID",name:"Acid Can",desc:"Shake it up and spew a short cone of burning acid."},
 {id:"keithbeef",icon:"MILK",name:"Micheal Keith's Beef",desc:"A superpowered cow gun that fires pressurized milk shots and splashy dairy beams."},
 {id:"dieseldirtbike",icon:"BIKE",name:"Diesel's Dirtbike",desc:"Rev forward in a risky dirtbike lane that shreds enemies you line up."},
 {id:"jackgun",icon:"SNIPE",name:"Jack F's Sniper",desc:"Slow clean shots. Every fourth bullet becomes a piercing boss-cracker."}
