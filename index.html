function updateFx(){for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vx*=.98;p.vy=p.vy*.98+.04;p.life--}for(const t of texts){t.y+=t.vy;t.life--}for(let i=particles.length-1;i>=0;i--)if(particles[i].life<=0)particles.splice(i,1);for(let i=texts.length-1;i>=0;i--)if(texts[i].life<=0)texts.splice(i,1);if(particles.length>420)particles.splice(0,particles.length-420);if(texts.length>80)texts.splice(0,texts.length-80)}

function ensureAudio(){
 if(profile.sound===false)return null;
 const AudioCtor=window.AudioContext||window.webkitAudioContext;
 if(!AudioCtor)return null;
 audioCtx=audioCtx||new AudioCtor();
 if(audioCtx.state==="suspended"){const resume=audioCtx.resume();if(resume&&resume.catch)resume.catch(()=>{})}
 return audioCtx;
}
function tone(freq,dur=.08,gain=.035,type="square",slide=.55,delay=0){
 const ac=ensureAudio();if(!ac)return;
 const o=ac.createOscillator(),g=ac.createGain(),now=ac.currentTime+delay;
 o.type=type;o.frequency.setValueAtTime(freq,now);if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(35,freq*slide),now+dur);
 g.gain.setValueAtTime(gain,now);g.gain.exponentialRampToValueAtTime(.0001,now+dur);
 o.connect(g);g.connect(ac.destination);o.start(now);o.stop(now+dur+.03);
}
function noise(dur=.12,gain=.04,cut=1200,delay=0){
 const ac=ensureAudio();if(!ac)return;
 const len=Math.max(1,Math.floor(ac.sampleRate*dur)),buf=ac.createBuffer(1,len,ac.sampleRate),data=buf.getChannelData(0);
 for(let i=0;i<len;i++)data[i]=(Math.random()*2-1)*(1-i/len);

   ctx.strokeStyle=final?"#88dcae":"#d4b083";ctx.lineWidth=10;ctx.beginPath();ctx.moveTo(elbowX,elbowY);ctx.quadraticCurveTo(side*(70+52*p),grabY+24,grabX,grabY);ctx.stroke();
   ctx.fillStyle=final?"#88dcae":"#d4b083";ctx.beginPath();ctx.arc(grabX,grabY,12,0,TAU);ctx.fill();
   ctx.strokeStyle="#f4e6c8";ctx.lineWidth=2.4;for(let f=0;f<5;f++){ctx.beginPath();ctx.moveTo(grabX+side*(-5+f*3),grabY+4);ctx.lineTo(grabX+side*(13+f*4),grabY+(f-2)*4);ctx.stroke()}
   ctx.restore();
  };
  crackArm(-1,leftArm,0);crackArm(1,rightArm,18);
  ctx.save();ctx.beginPath();ctx.ellipse(W/2,H*.5,76*crack,110*crack,0,0,TAU);ctx.clip();ctx.translate(W/2,H*.76-headP*H*.25);ctx.rotate((1-headP)*.18*Math.sin(t*.12));ctx.scale(1.25,1.25);drawGoldenbergHuman(0,0,1.15,t%7<3);ctx.restore();
  if(scream){ctx.save();ctx.globalAlpha=.16+.18*Math.sin(t*.75);ctx.fillStyle=final?"#00ff88":"#ff3355";ctx.fillRect(0,0,W,H);ctx.restore();rumble(4);ctx.fillStyle=final?"#00ff88":"#ff3355";ctx.font=`900 ${Math.min(50,Math.max(28,W/17))}px Courier New`;ctx.fillText("IT'S TIME FOR STUDY HALL!",W/2,H*.36)}
  if(crawl>.03){ctx.save();ctx.translate(W/2,H*.72-crawl*H*.2);ctx.rotate((1-crawl)*-.22);ctx.scale(1.2+crack*.18,1.2+crack*.18);drawGoldenbergHuman(0,0,1.2,t%7<3);ctx.restore()}
  if(t>238)drawBubble(W/2,H*.32,final?"Study hall follows you everywhere.":"I found a crack in the wall. You still have homework.",40);
  if(t>270){ctx.fillStyle=final?"#00ff88":"#ffe66d";ctx.font=`900 ${Math.min(44,Math.max(24,W/20))}px Courier New`;ctx.fillText(final?"UNDEAD GOLDENBERG RISES":"GOLDENBERG CLIMBS OUT",W/2,H*.15)}
 }
 ctx.fillStyle="rgba(255,255,255,.6)";ctx.font="900 12px Courier New";ctx.fillText("cutscene locked",W/2,H-24);
 ctx.restore();updateShake();if(t>cutscene.duration)endCutscene();
}
function loop(){
 requestAnimationFrame(loop);
 ctx.setTransform(DPR,0,0,DPR,0,0);ctx.clearRect(0,0,W,H);
 if(state==="beef"){updateBeef();drawBeefScene();return}
 if(["menu","weapons","customize","practice","records","codex","difficulty","victory","gameover"].includes(state)){tick++;bg();drawFx();updateFx();updateShake();return}
 if(state==="arena"){updateArena();drawArena()}
 else if(state==="cutscene")drawCutscene();
 else if(state==="obby"){updateObby();drawObby()}
}
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);return this}}
showMenu();loop();
})();
